steps:
  # Build the container image (build context is apps/api/, Dockerfile lives there too)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gabriel-agent:$BUILD_ID', '-t', 'gcr.io/$PROJECT_ID/gabriel-agent:latest', '-f', 'apps/api/Dockerfile', 'apps/api/']
    
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gabriel-agent:$BUILD_ID']
    
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gabriel-agent:latest']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
    - 'run'
    - 'deploy'
    - 'gabriel-agent'
    - '--image'
    - 'gcr.io/$PROJECT_ID/gabriel-agent:$BUILD_ID'
    - '--region'
    - 'us-east1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--service-account'
    - 'sm18-pa@$PROJECT_ID.iam.gserviceaccount.com'
    - '--memory'
    - '2Gi'
    - '--cpu'
    - '2'
    - '--timeout'
    - '900'
    - '--concurrency'
    - '80'
    - '--max-instances'
    - '10'
    - '--min-instances'
    - '1'
    - '--port'
    - '8081'
    - '--set-env-vars'
    - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,USE_SECRET_MANAGER=true,FAISS_PERSIST_DIRECTORY=/app/faiss_db,FAISS_USE_CLOUD_STORAGE=true,FAISS_BUCKET_NAME=gabriel-agent-faiss,SLACK_DEFAULT_CHANNEL=#sm18_fo,DEBUG=false,DB_CONNECTION_NAME=$PROJECT_ID:us-east1:gabriel-agent-db'
    - '--set-cloudsql-instances'
    - '$PROJECT_ID:us-east1:gabriel-agent-db'

  # ====================================================================
  # smfo-svc — the SMFO rebuild service (parallel deploy alongside gabriel-agent)
  # build context: apps/svc/   Dockerfile: apps/svc/Dockerfile   port: 8082
  # NO --allow-unauthenticated — webhook callers (Pub/Sub) authenticate via OIDC,
  # Streamlit→API authenticates via Google ID token.
  # ====================================================================
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/smfo-svc:$BUILD_ID', '-t', 'gcr.io/$PROJECT_ID/smfo-svc:latest', '-f', 'apps/svc/Dockerfile', 'apps/svc/']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smfo-svc:$BUILD_ID']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smfo-svc:latest']

  # ====================================================================
  # smfo-migrate Cloud Run Job — alembic upgrade against the smfo DB.
  # Deploy updates the job's image to the freshly-built tag, then execute
  # --wait blocks the build until migration finishes. A failed migration
  # halts the build so the smfo-svc deploy below never runs against a
  # half-applied schema.
  # ====================================================================
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-smfo-migrate-job'
    args:
    - 'run'
    - 'jobs'
    - 'deploy'
    - 'smfo-migrate'
    - '--image'
    - 'gcr.io/$PROJECT_ID/smfo-svc:$BUILD_ID'
    - '--region'
    - 'us-east1'
    - '--service-account'
    - 'smfo-svc-runtime@$PROJECT_ID.iam.gserviceaccount.com'
    - '--command'
    - 'python'
    - '--args'
    - '-m,alembic,upgrade,head'
    - '--task-timeout'
    - '600s'
    - '--max-retries'
    - '1'
    - '--set-cloudsql-instances'
    - '$PROJECT_ID:us-east1:gabriel-agent-db'
    - '--set-env-vars'
    - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,USE_SECRET_MANAGER=true,ENVIRONMENT=staging,DB_CONNECTION_NAME=$PROJECT_ID:us-east1:gabriel-agent-db,DB_HOST=/cloudsql/$PROJECT_ID:us-east1:gabriel-agent-db,DB_NAME=smfo'

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'execute-smfo-migrate-job'
    args:
    - 'run'
    - 'jobs'
    - 'execute'
    - 'smfo-migrate'
    - '--region'
    - 'us-east1'
    - '--wait'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
    - 'run'
    - 'deploy'
    - 'smfo-svc'
    - '--image'
    - 'gcr.io/$PROJECT_ID/smfo-svc:$BUILD_ID'
    - '--region'
    - 'us-east1'
    - '--platform'
    - 'managed'
    - '--no-allow-unauthenticated'
    - '--service-account'
    - 'smfo-svc-runtime@$PROJECT_ID.iam.gserviceaccount.com'
    - '--memory'
    - '2Gi'
    - '--cpu'
    - '2'
    - '--timeout'
    - '900'
    - '--concurrency'
    - '40'
    - '--max-instances'
    - '4'
    - '--min-instances'
    - '0'
    - '--port'
    - '8082'
    - '--set-env-vars'
    # ENVIRONMENT=staging until IAP lands — flip back to 'prod' once
    # OIDC_EXPECTED_AUDIENCE / IAP_AUDIENCE / ALLOWED_* are set, so the
    # _assert_prod_invariants startup check engages.
    # DB_NAME=smfo overrides the Secret Manager `db-name` value (which
    # points at the legacy `gabriel_agent` DB) so the new service uses
    # its own database.
    - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,USE_SECRET_MANAGER=true,ENVIRONMENT=staging,VERTEX_AI_LOCATION=us-east5,SLACK_DEFAULT_CHANNEL=#sm18_fo,DEBUG=false,DB_CONNECTION_NAME=$PROJECT_ID:us-east1:gabriel-agent-db,DB_HOST=/cloudsql/$PROJECT_ID:us-east1:gabriel-agent-db,DB_NAME=smfo,FAISS_PERSIST_DIRECTORY=/app/faiss_db,FAISS_USE_CLOUD_STORAGE=true,FAISS_BUCKET_NAME=gabriel-agent-faiss'
    - '--set-cloudsql-instances'
    - '$PROJECT_ID:us-east1:gabriel-agent-db'

  # ====================================================================
  # smfo-seed-vehicles Cloud Run Job — manual trigger only.
  # Reads vehicles.yaml from Secret Manager (secret name: smfo-vehicles-yaml)
  # and upserts into vehicles + vehicle_ownerships. Idempotent on short_name.
  # Operator runs after first deploy + any vehicles.yaml change:
  #   gcloud run jobs execute smfo-seed-vehicles --wait \
  #     --project=$PROJECT_ID --region=us-east1
  # ====================================================================
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-smfo-seed-vehicles-job'
    args:
    - 'run'
    - 'jobs'
    - 'deploy'
    - 'smfo-seed-vehicles'
    - '--image'
    - 'gcr.io/$PROJECT_ID/smfo-svc:$BUILD_ID'
    - '--region'
    - 'us-east1'
    - '--service-account'
    - 'smfo-svc-runtime@$PROJECT_ID.iam.gserviceaccount.com'
    - '--command'
    - 'python'
    - '--args'
    - '-m,scripts.seed_vehicles,--from-secret,smfo-vehicles-yaml'
    - '--task-timeout'
    - '300s'
    - '--max-retries'
    - '1'
    - '--set-cloudsql-instances'
    - '$PROJECT_ID:us-east1:gabriel-agent-db'
    - '--set-env-vars'
    - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,USE_SECRET_MANAGER=true,ENVIRONMENT=staging,DB_CONNECTION_NAME=$PROJECT_ID:us-east1:gabriel-agent-db,DB_HOST=/cloudsql/$PROJECT_ID:us-east1:gabriel-agent-db,DB_NAME=smfo'

  # ====================================================================
  # smfo-web — the Streamlit UI (behind IAP, read-only against Cloud SQL)
  # build context: apps/web/   Dockerfile: apps/web/Dockerfile   port: 8501
  # NO --allow-unauthenticated. IAP + Cloud Load Balancer fronts this service.
  # ====================================================================
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/smfo-web:$BUILD_ID', '-t', 'gcr.io/$PROJECT_ID/smfo-web:latest', '-f', 'apps/web/Dockerfile', 'apps/web/']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smfo-web:$BUILD_ID']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/smfo-web:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
    - 'run'
    - 'deploy'
    - 'smfo-web'
    - '--image'
    - 'gcr.io/$PROJECT_ID/smfo-web:$BUILD_ID'
    - '--region'
    - 'us-east1'
    - '--platform'
    - 'managed'
    - '--no-allow-unauthenticated'
    - '--service-account'
    - 'smfo-web-runtime@$PROJECT_ID.iam.gserviceaccount.com'
    - '--memory'
    - '1Gi'
    - '--cpu'
    - '1'
    - '--timeout'
    - '300'
    - '--concurrency'
    - '20'
    - '--max-instances'
    - '2'
    - '--min-instances'
    - '0'
    - '--port'
    - '8501'
    - '--set-env-vars'
    # See smfo-svc block above for the ENVIRONMENT=staging + DB_NAME=smfo
    # rationale (IAP deferred; isolated from legacy DB).
    - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,USE_SECRET_MANAGER=true,ENVIRONMENT=staging,DB_CONNECTION_NAME=$PROJECT_ID:us-east1:gabriel-agent-db,DB_HOST=/cloudsql/$PROJECT_ID:us-east1:gabriel-agent-db,DB_NAME=smfo'
    - '--set-cloudsql-instances'
    - '$PROJECT_ID:us-east1:gabriel-agent-db'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/gabriel-agent:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/gabriel-agent:latest'
  - 'gcr.io/$PROJECT_ID/smfo-svc:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/smfo-svc:latest'
  - 'gcr.io/$PROJECT_ID/smfo-web:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/smfo-web:latest'

# Build options
options:
  machineType: 'E2_HIGHCPU_8'
  substitutionOption: 'ALLOW_LOOSE'
  logging: 'CLOUD_LOGGING_ONLY'

# Use existing service account for Cloud Build
serviceAccount: 'projects/location-19291/serviceAccounts/sm18-pa@location-19291.iam.gserviceaccount.com'

# Build timeout
timeout: '1200s'

# Substitutions
substitutions:
  _SERVICE_NAME: 'gabriel-agent'
  _REGION: 'us-east1' 